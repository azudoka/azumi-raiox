<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Obrigada! | azumiRH</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f4f9;
      color: #0d1f35;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #0b1929;
      padding: 32px 48px 56px;
      border-bottom: 3px solid #3b82f6;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    .logo span {
      color: #3b82f6;
    }

    /* CONTENT */
    .content {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* CARD */
    .card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #dde6f0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-body {
      padding: 48px 52px;
    }

    .emoji {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .card h1 {
      font-size: 28px;
      font-weight: 800;
      color: #0d1f35;
      margin-bottom: 24px;
      line-height: 1.2;
    }

    /* INFO BOX */
    .info-box {
      border-left: 4px solid #3b82f6;
      background: #f0f4f9;
      border-radius: 0 8px 8px 0;
      padding: 20px 24px;
      margin-bottom: 32px;
    }

    .info-box p {
      font-size: 14.5px;
      color: #2a3f5a;
      line-height: 1.8;
    }

    .info-box strong {
      font-weight: 700;
      color: #0d1f35;
    }

    .support {
      font-size: 14.5px;
      color: #5a6f88;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .site-link {
      font-size: 14.5px;
      font-weight: 700;
      color: #3b82f6;
      text-decoration: none;
    }

    .site-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 540px) {
      header { padding: 24px 24px 40px; }
      .card-body { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">azumi<span>RH</span></div>
  </header>

  <div class="content">
    <div class="card">
      <div class="card-body">

        <span class="emoji">🎉</span>

        <h1>Uhull! Obrigada!</h1>

        <div class="info-box">
          <p>
            Nossa equipe analisará suas respostas e entregará o seu
            <strong>Raio-X Exclusivo</strong> em até <strong>36 horas úteis</strong>.
            Todas as informações são tratadas com total <strong>confidencialidade</strong>.
          </p>
        </div>

        <p class="support">
          Se tiver alguma dúvida ou precisar de suporte, conte conosco!
        </p>

        <a class="site-link" href="https://azumirh.com.br" target="_blank">azumirh.com.br</a>

      </div>
    </div>
  </div>

</body>
</html>
