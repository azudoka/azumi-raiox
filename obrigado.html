<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Obrigada! | Azumi RH</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@1,300&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --navy: #034C8B; /* Azul Principal Azumi */
      --blue: #017CCB; /* Azul Secundário */
      --off-white: #FAFAFA;
      --text: #222222;
      --border: #EDEDED;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--off-white);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: var(--navy);
      padding: 24px 48px;
      border-bottom: 4px solid var(--blue);
      text-align: center; /* Centraliza a logo */
    }

    /* ── LOGO AZUMI RH PADRÃO ── */
    .logo-azumi {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 32px;
      color: #FFFFFF; /* Toda branca no fundo azul */
      text-transform: lowercase;
    }
    .logo-rh {
      font-family: 'Avenir', 'Nunito', sans-serif;
      font-weight: 300;
      font-style: italic;
      font-size: 32px;
      color: #FFFFFF; /* Toda branca */
      text-transform: uppercase;
      margin-left: 2px;
    }

    /* CONTENT */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* CARD ALINHADO E ELEGANTE */
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(3, 76, 139, 0.08); /* Sombra com o tom da marca */
      max-width: 600px;
      width: 100%;
      text-align: center; /* Tira o aspecto "torto" */
      overflow: hidden;
    }

    .card-body {
      padding: 56px 48px;
    }

    /* EMOJI COM ANIMAÇÃO */
    .emoji {
      font-size: 56px;
      margin-bottom: 24px;
      display: inline-block;
      animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .card h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 24px;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    /* INFO BOX */
    .info-box {
      border-top: 4px solid var(--blue);
      background: var(--off-white);
      border: 1px solid var(--border);
      border-top: 4px solid var(--navy);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 32px;
      text-align: left; /* Mantém a leitura do texto confortável */
    }

    .info-box p {
      font-size: 15px;
      color: var(--text);
      line-height: 1.8;
    }

    .info-box strong {
      font-weight: 600;
      color: var(--navy);
    }

    .support {
      font-size: 14.5px;
      color: #666666;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* BOTÃO DE ACESSO AO SITE */
    .site-link {
      display: inline-block;
      font-size: 15px;
      font-weight: 600;
      color: #FFFFFF;
      background-color: var(--navy);
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .site-link:hover {
      background-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(1, 124, 203, 0.3);
    }

    @media (max-width: 540px) {
      header { padding: 20px; }
      .card-body { padding: 40px 24px; }
      .card h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <span class="logo-azumi">azumi</span><span class="logo-rh">RH</span>
    </div>
  </header>

  <div class="content">
    <div class="card">
      <div class="card-body">

        <span class="emoji">🎉</span>

        <h1>Uhull! Obrigada!</h1>

        <div class="info-box">
          <p>
            Nossa equipe analisará suas respostas e entregará o seu
            <strong>Raio-X Exclusivo</strong> em até <strong>36 horas úteis</strong>.
            Todas as informações são tratadas com total <strong>confidencialidade</strong>.
          </p>
        </div>

        <p class="support">
          Se tiver alguma dúvida ou precisar de suporte, conte conosco!
        </p>

        <a class="site-link" href="https://azumirh.com.br" target="_blank">Acessar nosso site</a>

      </div>
    </div>
  </div>

</body>
</html>
